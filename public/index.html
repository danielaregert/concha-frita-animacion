<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Concha Frita — 3D</title>
<style>
  html, body { margin: 0; background: #ffffff; color: #333; font-family: system-ui, sans-serif; }
  body { min-height: 500vh; }
  .word {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(22px, 4vw, 72px);
    font-style: italic; font-weight: 700; letter-spacing: -0.01em;
    color: #ff00aa;
    opacity: 0; pointer-events: none; z-index: 2;
    font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE", cursive;
    text-shadow: 0 2px 18px rgba(0,0,0,0.5);
  }
  #app { position: fixed; inset: 0; z-index: 0; touch-action: pan-y; }
  .hint { position: fixed; left: 12px; bottom: 12px; font-size: 12px; color: #666; z-index: 1; pointer-events: none; }
  .scroll-cue { position: fixed; right: 16px; top: 50%; transform: translateY(-50%); writing-mode: vertical-rl; font-size: 11px; letter-spacing: 2px; color: #888; z-index: 1; }
  .nav-link {
    position: fixed;
    font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE", cursive;
    font-size: clamp(18px, 3vw, 42px);
    font-weight: 700;
    font-style: italic;
    color: #ff00aa;
    text-decoration: none;
    z-index: 3;
    opacity: 0;
    pointer-events: none;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    transition: color 0.2s;
  }
  .nav-link:hover { color: #cc0088; }
  #link-tienda   { top: 8dvh;  left: 6vw; }
  #link-producto { top: 8dvh;  right: 6vw; }
  #link-juegos   { bottom: 8dvh; left: 6vw; }
  #link-contacto { bottom: 8dvh; right: 6vw; }
</style>
</head>
<body>
  <div id="app"></div>
  <div class="word" id="word-concha">concha frita</div>
  <a class="nav-link" id="link-tienda" href="#">tienda</a>
  <a class="nav-link" id="link-producto" href="#">producto</a>
  <a class="nav-link" id="link-juegos" href="/scroll_3d.html">juegos</a>
  <a class="nav-link" id="link-contacto" href="#">contacto</a>
  <div class="hint">scroll ↓</div>
  <div class="scroll-cue">SCROLL</div>

  <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const app = document.getElementById('app');

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 0.2, 4);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.enableZoom = false;
    controls.enablePan = false;
    controls.target.set(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const key = new THREE.DirectionalLight(0xffffff, 2.4);
    key.position.set(3, 5, 4);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.radius = 6;
    key.shadow.bias = -0.0005;
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xffffff, 0.6);
    fill.position.set(-4, 2, -3);
    scene.add(fill);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.ShadowMaterial({ opacity: 0.35 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const pivot = new THREE.Group();
    scene.add(pivot);

    let anim = null;
    let settle = null;
    const camFar = { pos: new THREE.Vector3(), target: new THREE.Vector3() };
    const camNear = { pos: new THREE.Vector3(), target: new THREE.Vector3() };
    let closeRadius = 1, closeHeight = 0;
    let scrollProgress = 0;
    let smoothedScroll = 0;
    let ready = false;
    const wordConcha = document.getElementById('word-concha');
    const links = [
      document.getElementById('link-tienda'),
      document.getElementById('link-producto'),
      document.getElementById('link-juegos'),
      document.getElementById('link-contacto'),
    ];

    // Mouse tracking for face-follow effect
    const mouse = { tx: 0, ty: 0, cx: 0, cy: 0 };
    const MAX_ROTATE = 0.3; // radians (~17 degrees)
    addEventListener('mousemove', e => {
      mouse.tx = (e.clientX / innerWidth - 0.5) * 2;   // -1 to 1
      mouse.ty = (e.clientY / innerHeight - 0.5) * 2;  // -1 to 1
    });

    new GLTFLoader().load('./concha-frita.glb', (gltf) => {
      const model = gltf.scene;

      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      model.position.set(-center.x, -center.y + size.y / 2, -center.z);
      model.traverse((o) => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = false; } });
      pivot.add(model);
      pivot.position.y = -size.y / 2;
      ground.position.y = -size.y / 2;

      const r = Math.max(size.x, size.y, size.z) * 2;
      key.shadow.camera.left = -r;
      key.shadow.camera.right = r;
      key.shadow.camera.top = r;
      key.shadow.camera.bottom = -r;
      key.shadow.camera.near = 0.1;
      key.shadow.camera.far = r * 10;
      key.shadow.camera.updateProjectionMatrix();

      const maxDim = Math.max(size.x, size.y, size.z);
      const dist = maxDim / (2 * Math.tan((Math.PI * camera.fov) / 360)) * 1.6;
      camera.position.set(0, 0, dist);
      controls.minDistance = maxDim * 0.3;
      controls.maxDistance = maxDim * 8;
      controls.update();

      const headY = size.y * 0.32;
      closeHeight = headY;
      closeRadius = Math.max(size.x, size.z) * 1.0;
      camFar.pos.set(0, 0, dist);
      camFar.target.set(0, 0, 0);
      camNear.pos.set(0, headY, closeRadius);
      camNear.target.set(0, headY, 0);

      ready = true;

      anim = { start: performance.now(), duration: 2200, dropFrom: maxDim * 4, restY: -size.y / 2 };
      pivot.position.y = anim.restY + anim.dropFrom;
      pivot.scale.setScalar(0.25);
    }, undefined, (err) => console.error(err));

    function easeOutBounce(x) {
      const n1 = 7.5625, d1 = 2.75;
      if (x < 1 / d1) return n1 * x * x;
      if (x < 2 / d1) return n1 * (x -= 1.5 / d1) * x + 0.75;
      if (x < 2.5 / d1) return n1 * (x -= 2.25 / d1) * x + 0.9375;
      return n1 * (x -= 2.625 / d1) * x + 0.984375;
    }
    const easeOutCubic = (x) => 1 - Math.pow(1 - x, 3);

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    addEventListener('scroll', () => {
      const max = document.body.scrollHeight - innerHeight;
      scrollProgress = max > 0 ? Math.min(1, Math.max(0, scrollY / max)) : 0;
    }, { passive: true });

    const easeInOutCubic = (x) => x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;

    renderer.setAnimationLoop(() => {
      if (ready) {
        smoothedScroll += (scrollProgress - smoothedScroll) * 0.08;
        const s = smoothedScroll;

        if (s < 0.5) {
          const k = easeInOutCubic(s / 0.5);
          camera.position.lerpVectors(camFar.pos, camNear.pos, k);
          controls.target.lerpVectors(camFar.target, camNear.target, k);
        } else {
          camera.position.copy(camNear.pos);
          controls.target.copy(camNear.target);
        }
        controls.enabled = s < 0.02;

        // "concha" text fades in/out around midpoint
        const conchaK = Math.max(0, 1 - Math.abs(s - 0.5) / 0.14);
        wordConcha.style.opacity = conchaK;


        // Face follows mouse (smooth lerp)
        mouse.cx += (mouse.tx - mouse.cx) * 0.06;
        mouse.cy += (mouse.ty - mouse.cy) * 0.06;
      }

      if (anim) {
        const elapsed = (performance.now() - anim.start) / 1000;
        const t = Math.min(1, (elapsed * 1000) / anim.duration);
        const bounce = easeOutBounce(t);
        pivot.position.y = anim.restY + anim.dropFrom * (1 - bounce);
        const s = 0.25 + (1 - 0.25) * easeOutCubic(Math.min(1, t * 1.2));
        pivot.scale.setScalar(s);

        const damp = Math.pow(1 - t, 2);
        pivot.rotation.z = Math.sin(elapsed * 7) * 0.55 * damp;
        pivot.rotation.x = Math.sin(elapsed * 5 + 1) * 0.35 * damp;

        if (t >= 1) {
          pivot.position.y = anim.restY;
          pivot.scale.setScalar(1);
          pivot.rotation.set(0, 0, 0);
          settle = { start: performance.now(), duration: 3200 };
          anim = null;
        }
      } else if (settle) {
        const e = (performance.now() - settle.start) / 1000;
        const st = Math.min(1, (e * 1000) / settle.duration);
        const damp = Math.pow(1 - st, 2);
        pivot.rotation.x = Math.sin(e * 3.2) * 0.18 * damp;
        if (st >= 1) { pivot.rotation.set(0, 0, 0); settle = null; }
      } else if (ready) {
        // Mouse-follow rotation (only when intro animations are done)
        pivot.rotation.y = mouse.cx * MAX_ROTATE;
        pivot.rotation.x = mouse.cy * -MAX_ROTATE * 0.5;
      }

      controls.update();
      renderer.render(scene, camera);
    });

    // GSAP: links appear once on scroll and stay forever
    gsap.registerPlugin(ScrollTrigger);
    gsap.set('.nav-link', { y: 80, opacity: 0 });
    gsap.to('.nav-link', {
      y: 0,
      opacity: 1,
      duration: 0.8,
      ease: 'power3.out',
      stagger: 0.1,
      scrollTrigger: {
        trigger: document.body,
        start: 'top -40%',
        once: true,
      },
      onComplete: () => {
        document.querySelectorAll('.nav-link').forEach(el => {
          el.style.pointerEvents = 'auto';
        });
      }
    });
  </script>
</body>
</html>
