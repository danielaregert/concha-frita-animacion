    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #0b0213; overflow: hidden;
            width: 100%;
            height: 100vh;
            height: 100svh; /* viewport pequeño (URL bar visible), soporte moderno */
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas { display: block; touch-action: none; }
        .hud {
            position: absolute;
            bottom: 20px; width: 100%; text-align: center;
            color: #fff; font-family: 'Comic Neue', 'Comic Sans MS', cursive; opacity: 0.4;
            pointer-events: none; text-transform: uppercase; letter-spacing: 3px;
            font-size: 12px;
        }
        .placa {
            position: absolute;
            width: 100%;
            text-align: center;
            pointer-events: none;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive;
            color: #fff;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .placa.visible { opacity: 1; }
        .placa { padding: 0 16px; }
        #p1 { top: 36%; font-size: 44px; font-weight: bold; }
        #p2 { top: 46%; font-size: 30px; font-weight: 300; letter-spacing: 2px; }
        #p3 { top: 36%; font-size: 34px; }
        #p4 { top: 46%; font-size: 38px; font-weight: bold; }
        #p5 { top: 40%; font-size: 42px; font-weight: bold; }
        #p6 { top: 36%; font-size: 30px; font-weight: 300; }
        #p7 { top: 46%; font-size: 34px; }
        #responder-wrap {
            position: absolute;
            top: 58%;
            width: 100%;
            text-align: center;
            opacity: 0;
            transition: opacity 0.6s ease;
            z-index: 10;
        }
        #responder-wrap.visible { opacity: 1; }
        #btn-responder {
            font-family: 'Comic Neue', 'Comic Sans MS', cursive;
            font-size: 18px;
            padding: 14px 40px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            letter-spacing: 2px;
            transition: background 0.3s, border-color 0.3s;
        }
        #btn-responder:hover {
            background: rgba(255,255,255,0.1);
            border-color: #fff;
        }
        #respuesta-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #respuesta-overlay.active { display: flex; }
        #respuesta-overlay textarea {
            width: 80%;
            max-width: 500px;
            height: 120px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            color: #fff;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive;
            font-size: 18px;
            padding: 16px;
            resize: none;
            outline: none;
        }
        #respuesta-overlay textarea::placeholder { color: rgba(255,255,255,0.3); }
        #respuesta-overlay .overlay-btns {
            margin-top: 16px;
            display: flex;
            gap: 12px;
        }
        #respuesta-overlay button {
            font-family: 'Comic Neue', 'Comic Sans MS', cursive;
            font-size: 16px;
            padding: 10px 28px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.3s;
        }
        #respuesta-overlay button:hover { background: rgba(255,255,255,0.15); }

        #loader {
            position: fixed; inset: 0;
            background: #0b0213;
            z-index: 1000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #fff; font-family: 'Comic Neue', 'Comic Sans MS', cursive;
            transition: opacity 0.8s ease;
        }
        #loader.done { opacity: 0; pointer-events: none; }
        #loader-msg {
            font-size: 18px; letter-spacing: 3px;
            text-transform: uppercase; opacity: 0.7;
        }
        #loader-bar {
            margin-top: 20px;

        #loader-bar > div {

            text-decoration: none;
            z-index: 50;
            transition: color 0.3s;
        }
        #credit:hover { color: rgba(255, 255, 255, 0.9); }

        @media (max-width: 640px) {
            /* Solo ajustamos el popup de respuesta para mobile */
            #respuesta-overlay textarea {
                width: 88%;
                font-size: 16px; /* evita el auto-zoom de iOS al focus */

<script>
    // === PRELOADER (música + gltf + textura + fuente) ===
    const LOAD_TARGETS = ['music', 'gltf', 'texture', 'font'];
    const loaded = new Set();
    const loaderMsg = document.getElementById('loader-msg');
    const loaderBar = document.querySelector('#loader-bar > div');
    const btnEntrar = document.getElementById('btn-entrar');
    function markLoaded(key) {
        if (loaded.has(key)) return;
        loaded.add(key);
        const pct = (loaded.size / LOAD_TARGETS.length) * 100;
        if (loaderBar) loaderBar.style.width = pct + '%';
        if (loaded.size === LOAD_TARGETS.length) {
            if (loaderMsg) loaderMsg.textContent = 'listo';
            if (btnEntrar) btnEntrar.classList.add('ready');
        }
    }

    // Cargar Comic Neue antes de que "entrar" quede disponible
    // (asi el canvas de las frases rendea con la tipografia correcta)
    if (document.fonts && document.fonts.load) {
        Promise.all([
            document.fonts.load("400 16px 'Comic Neue'"),
            document.fonts.load("700 56px 'Comic Neue'")
        ]).then(() => markLoaded('font'))
          .catch(() => markLoaded('font'));
        // Fallback por si el font tarda demasiado o falla silencioso
        setTimeout(() => markLoaded('font'), 5000);
    } else {
        markLoaded('font');
    }

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2('#0b0213', 0.012);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 300);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // === LUCES ===
    const ambient = new THREE.AmbientLight(0x222222);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
    dirLight.position.set(30, 50, 30);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    scene.add(dirLight);

    const accentLight = new THREE.PointLight(0x2596be, 1.5, 60);
    accentLight.position.set(-8, 6, 10);
    scene.add(accentLight);

    // (spotlight y cono removidos)

    // === PISO ===
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100),
        new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.9 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -5;
    floor.receiveShadow = true;
    scene.add(floor);

    // === TELA FISICA (Verlet) ===
    const MASS = 0.5, TIMESTEP = 18/1000, TIMESTEP_SQ = TIMESTEP*TIMESTEP, DRAG = 0.96;
    class Particle { constructor(x,y,z){ this.position=new THREE.Vector3(x,y,z); this.previous=new THREE.Vector3(x,y,z); this.original=new THREE.Vector3(x,y,z); this.mass=MASS; }}
    class Cloth {
        constructor(w,h,size){
            this.w=w; this.h=h; this.particles=[]; this.constraints=[];
            const sx=size/w, sy=size/h;
            for(let v=0;v<=h;v++) for(let u=0;u<=w;u++) this.particles.push(new Particle((u/w-0.5)*size, 8, (v/h-0.5)*size));
            const idx=(u,v)=>u+v*(w+1);
            for(let v=0;v<=h;v++) for(let u=0;u<=w;u++){
                if(u<w) this.constraints.push([this.particles[idx(u,v)],this.particles[idx(u+1,v)],sx]);
                if(v<h) this.constraints.push([this.particles[idx(u,v)],this.particles[idx(u,v+1)],sy]);
            }
        }
    }
    const clothSegs = 30, clothSize = 16;
    const cloth = new Cloth(clothSegs, clothSegs, clothSize);
    const clothGeo = new THREE.ParametricGeometry((u,v,t)=>t.setScalar(0), clothSegs, clothSegs);
    const clothTex = new THREE.TextureLoader().load(
        'https://images.unsplash.com/photo-1541701494587-cb58502866ab?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&h=800&q=80',
        () => markLoaded('texture'),
        undefined,
        () => markLoaded('texture') // si falla, seguimos igual
    );
    // Fallback por timeout: si la textura tarda mas de 10s, destrabamos
    setTimeout(() => markLoaded('texture'), 10000);
    clothTex.anisotropy = 16;
    const clothMesh = new THREE.Mesh(clothGeo, new THREE.MeshStandardMaterial({ map: clothTex, roughness: 0.5, metalness: 0.1, side: THREE.DoubleSide }));
    clothMesh.castShadow = true; clothMesh.receiveShadow = true;
    scene.add(clothMesh);

    const clothGravity = new THREE.Vector3(0, -9.81 * 8, 0);
    function simulateCloth(time) {
        const ws = Math.cos(time/2000)*10+25;
        const wf = new THREE.Vector3(Math.sin(time/2000), Math.cos(time/3000), Math.sin(time/1000)).normalize().multiplyScalar(ws);
        for(let i=0;i<cloth.particles.length;i++){
            const p=cloth.particles[i];
            const f=new THREE.Vector3().copy(clothGravity).add(wf);
            const v=new THREE.Vector3().subVectors(p.position,p.previous).multiplyScalar(DRAG);
            p.previous.copy(p.position);
            p.position.add(v).add(f.multiplyScalar(p.mass*TIMESTEP_SQ));
        }
        for(let it=0;it<8;it++){
            for(let i=0;i<cloth.constraints.length;i++){
                const c=cloth.constraints[i];
                const d=new THREE.Vector3().subVectors(c[1].position,c[0].position);
                const l=d.length(); if(l===0)continue;
                const cor=d.multiplyScalar(1-c[2]/l).multiplyScalar(0.5);
                c[0].position.add(cor); c[1].position.sub(cor);
            }
            for(let u=0;u<=cloth.w;u++){
                const p=cloth.particles[u];
                p.position.copy(p.original); p.position.x+=Math.sin(time/500+u)*0.5; p.previous.copy(p.position);
            }
            // Colision de todos los cuerpos con la tela
            if (typeof bodies !== 'undefined') {
                for (const b of bodies) {
                    const bPos = b.mesh.position;
                    const bR = b.r + 0.2;
                    for(let i=0;i<cloth.particles.length;i++){
                        const p=cloth.particles[i];
                        const dd=new THREE.Vector3().subVectors(p.position, bPos);
                        if(dd.length() < bR) p.position.copy(bPos).add(dd.normalize().multiplyScalar(bR));
                    }
                }
            }
            // Colision concha frita con tela (capsula vertical)
            if(conchaModel) {
                const cfPos = conchaModel.position;
                const capsuleRadius = 0.8;
                const capsuleBottom = cfPos.y;
                const capsuleTop = cfPos.y + 2.0; // altura del modelo
                for(let i=0;i<cloth.particles.length;i++){
                    const p=cloth.particles[i];
                    // Punto mas cercano en el eje vertical de la capsula
                    const clampedY = Math.max(capsuleBottom, Math.min(capsuleTop, p.position.y));
                    const dx = p.position.x - cfPos.x;
                    const dy = p.position.y - clampedY;
                    const dz = p.position.z - cfPos.z;
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                    if(dist < capsuleRadius && dist > 0.001) {
                        const nx = dx/dist, ny = dy/dist, nz = dz/dist;
                        p.position.x = cfPos.x + nx * capsuleRadius;
                        p.position.y = clampedY + ny * capsuleRadius;
                        p.position.z = cfPos.z + nz * capsuleRadius;
                    }
                }
            }
            for(let i=0;i<cloth.particles.length;i++) if(cloth.particles[i].position.y<-4.8) cloth.particles[i].position.y=-4.8;
        }
    }

    // === CONCHA FRITA ANIMADA ===
    let conchaModel = null, conchaAngle = 0, conchaFloorY = -5;
    let conchaMixer = null;
    const gltfLoader = new THREE.GLTFLoader();
    gltfLoader.load('concha-frita-animated.glb', (gltf) => {
        conchaModel = gltf.scene;
        const bb = new THREE.Box3().setFromObject(conchaModel);
        const s = 5 / (bb.getSize(new THREE.Vector3()).y || 1);
        conchaModel.scale.setScalar(s);
        conchaModel.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
        const sb = new THREE.Box3().setFromObject(conchaModel);
        conchaFloorY = -5 - sb.min.y;
        conchaModel.position.set(0, conchaFloorY, 0);
        scene.add(conchaModel);

        if (gltf.animations && gltf.animations.length) {
            conchaMixer = new THREE.AnimationMixer(conchaModel);
            conchaMixer.clipAction(gltf.animations[0]).play();
        }
        markLoaded('gltf');
    }, undefined, () => markLoaded('gltf')); // si falla, seguimos igual

    // === CUERPOS CON FISICA ===
    function makeBody(mesh, r, vx, vy, vz) {
        mesh.castShadow = true;
        scene.add(mesh);
        return { mesh, r, vel: new THREE.Vector3(vx, vy, vz) };
    }

    const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 32, 32),
        new THREE.MeshStandardMaterial({ color: 0x2288ff, roughness: 0.1, metalness: 0.8 })
    );
    sphere.position.set(-4, 5, 2);

    const sphereSmall = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 32, 32),
        new THREE.MeshStandardMaterial({ color: 0xffaa22, roughness: 0.1, metalness: 0.8 })
    );
    sphereSmall.position.set(-2, 10, 1);

    const cube = new THREE.Mesh(
        new THREE.BoxGeometry(1.5, 1.5, 1.5),
        new THREE.MeshStandardMaterial({ color: 0xff4422, roughness: 0.1, metalness: 0.8 })
    );
    cube.position.set(4, 5, -2);

    const bodies = [
        makeBody(sphere, 1.2, 3, 0, 2),
        makeBody(sphereSmall, 0.5, 5, 3, -4),
        makeBody(cube, 1.1, -1, 0, 1.5)
    ];

    const GRAVITY = -15;
    const BOUNCE = 0.75;
    const FLOOR_Y = -5;
    const WALL = 12;

    function bounceBodies(dt) {
        for (const b of bodies) {
            b.vel.y += GRAVITY * dt;
            b.mesh.position.addScaledVector(b.vel, dt);

            // Piso
            if (b.mesh.position.y < FLOOR_Y + b.r) {
                b.mesh.position.y = FLOOR_Y + b.r;
                b.vel.y = Math.abs(b.vel.y) * BOUNCE;
            }
            // Techo
            if (b.mesh.position.y > 15) { b.mesh.position.y = 15; b.vel.y *= -0.5; }
            // Paredes
            if (b.mesh.position.x > WALL - b.r) { b.mesh.position.x = WALL - b.r; b.vel.x *= -BOUNCE; }
            if (b.mesh.position.x < -WALL + b.r) { b.mesh.position.x = -WALL + b.r; b.vel.x *= -BOUNCE; }
            if (b.mesh.position.z > WALL - b.r) { b.mesh.position.z = WALL - b.r; b.vel.z *= -BOUNCE; }
            if (b.mesh.position.z < -WALL + b.r) { b.mesh.position.z = -WALL + b.r; b.vel.z *= -BOUNCE; }

            // Rotación visual (cubo más lento)
            const rotSpeed = (b.mesh === cube) ? 0.3 : 1;
            b.mesh.rotation.x += b.vel.x * dt * rotSpeed;
            b.mesh.rotation.z += b.vel.z * dt * rotSpeed;

            // Limitar velocidad del cubo
            if (b.mesh === cube) {
                const spd = b.vel.length();
                if (spd > 6) b.vel.multiplyScalar(6 / spd);
            }
        }

        // Colisiones entre cuerpos
        for (let i = 0; i < bodies.length; i++) {
            for (let j = i + 1; j < bodies.length; j++) {
                const a = bodies[i], b = bodies[j];
                const d = new THREE.Vector3().subVectors(b.mesh.position, a.mesh.position);
                const dist = d.length();
                const minDist = a.r + b.r;
                if (dist < minDist && dist > 0.01) {
                    const n = d.normalize();
                    const overlap = minDist - dist;
                    a.mesh.position.addScaledVector(n, -overlap * 0.5);
                    b.mesh.position.addScaledVector(n, overlap * 0.5);
                    const relVel = new THREE.Vector3().subVectors(a.vel, b.vel);
                    const vn = relVel.dot(n);
                    if (vn > 0) {
                        a.vel.addScaledVector(n, -vn * 0.8);
                        b.vel.addScaledVector(n, vn * 0.8);
                    }
                }
            }
        }

        // Colisión con concha frita
        if (conchaModel) {
            const cfPos = conchaModel.position;
            const cfR = 1.5;
            for (const b of bodies) {
                const dx = b.mesh.position.x - cfPos.x;
                const dz = b.mesh.position.z - cfPos.z;
                const dh = Math.sqrt(dx*dx + dz*dz);
                const minD = b.r + cfR;
                if (dh < minD && b.mesh.position.y < cfPos.y + 5 && dh > 0.01) {
                    const nx = dx/dh, nz = dz/dh;
                    b.mesh.position.x = cfPos.x + nx * minD;
                    b.mesh.position.z = cfPos.z + nz * minD;
                    const vDot = b.vel.x * nx + b.vel.z * nz;
                    if (vDot < 0) {
                        b.vel.x -= 1.5 * vDot * nx;
                        b.vel.z -= 1.5 * vDot * nz;
                        b.vel.y += 3;
                    }
                }
            }
        }

        // Empujones aleatorios
        for (const b of bodies) {
            if (Math.random() < 0.02) {
                b.vel.x += (Math.random() - 0.5) * 8;
                b.vel.z += (Math.random() - 0.5) * 8;
                b.vel.y += Math.random() * 6;
            }
        }
    }

    // === IMPORTANCIAS (cosas que importan cayendo del cielo) ===
    const SUPABASE_URL = 'https://rhpozdfhnmaefvdiofrx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_TOb3I1gHrdPx-sVvJjJrmQ_Oe3YcgS9';
    const SUPABASE_ON  = !SUPABASE_URL.startsWith('TU_') && !SUPABASE_KEY.startsWith('TU_');
    const db = SUPABASE_ON ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

    // Seeds para ver la simulación sin Supabase
    const SEED_IMPORTANCIAS = [
        'mi mamá', 'dormir siesta', 'el mate', 'los chicitos', 'caminar descalza',
        'que me abracen', 'el olor a lluvia', 'reírme fuerte', 'la concha frita',
        'ver el mar', 'que me escuchen', 'cantar en el auto', 'el pan casero',
        'silencio', 'bailar sola', 'mi gato', 'el domingo a la tarde', 'decir la verdad'
    ];

    const importancias = []; // { mesh, vy, vx, vz, vrotX, vrotY, vrotZ, width, height, resting, restPhase }
    const PILE_GRID = new Map(); // clave "gx,gz" -> cantidad apilada
    const PILE_CELL = 2.2;       // tamaño de celda de la grilla de apilado
    const PILE_THICKNESS = 0.12; // alto visual por capa

    // === MUSICA DE FONDO + SONIDO DE ATERRIZAJE ===
    let soundOn = true;

    // Musica de fondo (bossa.mp3 en loop) - se precarga, se reproduce al "entrar"
    const bgMusic = new Audio('bossa.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.5;
    bgMusic.preload = 'auto';
    bgMusic.addEventListener('canplaythrough', () => markLoaded('music'), { once: true });
    bgMusic.addEventListener('error', () => markLoaded('music'), { once: true });
    // Fallback: si el navegador no dispara canplaythrough, destrabamos a los 8s
    setTimeout(() => markLoaded('music'), 8000);

    // Sonido procedural de gota via Web Audio (sweep de pitch + click filtrado)
    let audioCtx = null;
    function ensureAudio() {
        if (audioCtx) return audioCtx;
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        audioCtx = new AC();
        return audioCtx;
    }
    document.addEventListener('pointerdown', () => {
        const c = ensureAudio();
        if (c && c.state !== 'running') c.resume();
    });

    function playLandSound(highlight = false) {
        if (!soundOn) return;
        const ctx = ensureAudio();
        if (!ctx) return;
        if (ctx.state !== 'running') ctx.resume();
        const now = ctx.currentTime;

        // Gota: sinusoide con sweep rapido de pitch descendente
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        const basePitch = highlight ? 1100 : 750;
        const startFreq = basePitch + (Math.random() - 0.5) * basePitch * 0.3;
        osc.frequency.setValueAtTime(startFreq, now);
        osc.frequency.exponentialRampToValueAtTime(startFreq * 0.4, now + 0.05);

        const gain = ctx.createGain();
        const peak = highlight ? 0.45 : 0.22;
        const decay = highlight ? 0.13 : 0.09;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(peak, now + 0.003);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + decay);

        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.25);

        // Click de salpicadura: ruido corto filtrado
        const buf = ctx.createBuffer(1, 256, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
            const t = i / data.length;
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2);
        }
        const noise = ctx.createBufferSource();
        noise.buffer = buf;

        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 1800 + Math.random() * 800;
        bp.Q.value = 5;

        const ng = ctx.createGain();
        ng.gain.value = highlight ? 0.12 : 0.06;
        noise.connect(bp).connect(ng).connect(ctx.destination);
        noise.start(now);
    }

    // Boton apagar / prender sonido
    const soundBtn = document.createElement('button');
    soundBtn.textContent = 'apagar sonido';
    soundBtn.style.cssText = "position:fixed;top:20px;left:20px;z-index:1000;padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.4);background:rgba(0,0,0,0.35);color:#fff;font-family:'Comic Neue','Comic Sans MS',cursive;font-size:13px;letter-spacing:1px;cursor:pointer;";
    soundBtn.addEventListener('click', () => {
        soundOn = !soundOn;
        if (soundOn) {
            bgMusic.play().catch(() => {});
            soundBtn.textContent = 'apagar sonido';
        } else {
            bgMusic.pause();
            soundBtn.textContent = 'prender sonido';
        }
    });
    document.body.appendChild(soundBtn);

    function makeImportanciaMesh(text) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const fontSize = 56;
        const font = `bold ${fontSize}px 'Comic Neue', 'Comic Sans MS', cursive`;
        ctx.font = font;
        const metrics = ctx.measureText(text);
        const padX = 28;
        const padY = 70; // mas colchon vertical para que nunca se corte
        canvas.width  = Math.ceil(metrics.width + padX * 2);
        canvas.height = fontSize + padY * 2;

        ctx.font = font;
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'left';
        // Sombra suave
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillText(text, padX + 2, canvas.height / 2 + 2);
        // Color
        const tints = ['#ffffff', '#ffd4e5', '#ffb3d1', '#c2e7ff', '#ffe08a'];
        ctx.fillStyle = tints[Math.floor(Math.random() * tints.length)];
        ctx.fillText(text, padX, canvas.height / 2);

        const tex = new THREE.CanvasTexture(canvas);
        tex.anisotropy = 8;
        const mat = new THREE.MeshBasicMaterial({
            map: tex, transparent: true, side: THREE.DoubleSide, alphaTest: 0.01
        });
        // Escala fija: que el texto tenga un tamanio consistente en 3D,
        // y el plano crezca proporcional al padding del canvas.
        const TEXT_WORLD_HEIGHT = 0.55;
        const scale = TEXT_WORLD_HEIGHT / fontSize;
        const h = canvas.height * scale;
        const w = canvas.width  * scale;
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
        mesh.castShadow = false;
        return { mesh, width: w, height: h };
    }

    function dropImportancia(text, opts = {}) {
        if (!text || !text.trim()) return;
        const { mesh, width, height } = makeImportanciaMesh(text.trim());
        const x0 = (Math.random() - 0.5) * 18;
        const z0 = (Math.random() - 0.5) * 10 + 1;
        const y0 = 14 + Math.random() * 8;
        mesh.position.set(x0, y0, z0);
        mesh.rotation.set(
            (Math.random() - 0.5) * 0.8,
            (Math.random() - 0.5) * 0.8,
            (Math.random() - 0.5) * 0.8
        );
        scene.add(mesh);
        importancias.push({
            mesh, width, height,
            vy: -0.02, vx: (Math.random() - 0.5) * 1.6, vz: (Math.random() - 0.5) * 0.8,
            vrotX: (Math.random() - 0.5) * 2.2,
            vrotY: (Math.random() - 0.5) * 2.0,
            vrotZ: (Math.random() - 0.5) * 2.2,
            resting: false,
            restPhase: 0,         // 0 cayendo, 1 acomodando, 2 quieto
            targetY: 0, targetRotZ: 0,
            highlight: !!opts.highlight,
            highlightUntil: performance.now() + 1200,
        });
    }

    async function persistImportancia(text) {
        if (!SUPABASE_ON) return;
        try {
            const { error } = await db.from('importancias').insert({ texto: text });
            if (error) console.warn('supabase insert:', error);
        } catch (e) { console.warn(e); }
    }

    async function rainPastImportancias(beforeIso) {
        let items = [];
        if (SUPABASE_ON) {
            try {
                let q = db.from('importancias').select('texto').limit(200);
                if (beforeIso) q = q.lt('created_at', beforeIso);
                const { data, error } = await q;
                if (!error && data) items = data.map(r => r.texto);
            } catch (e) { console.warn(e); }
        }
        if (items.length === 0) items = SEED_IMPORTANCIAS.slice();
        items.sort(() => Math.random() - 0.5);
        items.forEach((t, i) => setTimeout(() => dropImportancia(t), i * 550 + Math.random() * 200));
    }

    function pileKey(x, z) {
        const gx = Math.round(x / PILE_CELL);
        const gz = Math.round(z / PILE_CELL);
        return gx + ',' + gz;
    }

    function layFlat(imp) {
        // Elegí la celda de apilado según donde cayó
        const key = pileKey(imp.mesh.position.x, imp.mesh.position.z);
        const stacked = PILE_GRID.get(key) || 0;
        PILE_GRID.set(key, stacked + 1);

        // Todas planas boca arriba (sin inclinacion)
        imp.targetRotX = -Math.PI / 2;
        imp.targetRotY = 0;
        imp.targetRotZ = (Math.random() - 0.5) * Math.PI * 0.5; // solo giran en su propio plano

        // Apenas por encima del piso, apiladas
        imp.targetY = FLOOR_Y + 0.02 + stacked * PILE_THICKNESS;

        imp.restPhase = 1;
        playLandSound(imp.highlight);
    }

    function updateImportancias(dt) {
        const now = performance.now();
        const G = -9.0;
        for (const imp of importancias) {
            if (imp.restPhase === 0) {
                // Cayendo: gravedad + tumble 3D
                imp.vy += G * dt;
                imp.mesh.position.x += imp.vx * dt;
                imp.mesh.position.y += imp.vy * dt;
                imp.mesh.position.z += imp.vz * dt;
                imp.mesh.rotation.x += imp.vrotX * dt;
                imp.mesh.rotation.y += imp.vrotY * dt;
                imp.mesh.rotation.z += imp.vrotZ * dt;

                // Gatillo de aterrizaje subido para que el plano (mas alto ahora)
                // no clippee contra el piso mientras esta tumbleando
                if (imp.mesh.position.y <= FLOOR_Y + 1.0) {
                    imp.mesh.position.y = FLOOR_Y + 1.0;
                    layFlat(imp);
                }
            } else if (imp.restPhase === 1) {
                // Acomodandose: se inclina a la orientacion objetivo
                const k = 8 * dt;
                imp.mesh.position.y += (imp.targetY - imp.mesh.position.y) * k;
                imp.mesh.rotation.x += (imp.targetRotX - imp.mesh.rotation.x) * k;
                imp.mesh.rotation.y += (imp.targetRotY - imp.mesh.rotation.y) * k;
                imp.mesh.rotation.z += (imp.targetRotZ - imp.mesh.rotation.z) * k;
                // Frenado lateral suave hasta quietud
                imp.mesh.position.x += imp.vx * dt;
                imp.mesh.position.z += imp.vz * dt;
                imp.vx *= 0.85; imp.vz *= 0.85;
                if (Math.abs(imp.mesh.position.y - imp.targetY) < 0.01 &&
                    Math.abs(imp.mesh.rotation.x - imp.targetRotX) < 0.02) {
                    imp.mesh.position.y = imp.targetY;
                    imp.mesh.rotation.x = imp.targetRotX;
                    imp.mesh.rotation.y = imp.targetRotY;
                    imp.mesh.rotation.z = imp.targetRotZ;
                    imp.restPhase = 2;
                }
            }

            if (imp.highlight && now < imp.highlightUntil) {
                const t = (imp.highlightUntil - now) / 1200;
                imp.mesh.scale.setScalar(1 + t * 0.4);
            } else if (imp.highlight) {
                imp.mesh.scale.setScalar(1);
                imp.highlight = false;
            }
        }
    }

    // === DRAG PARA ROTAR CAMARA (mouse + touch via Pointer Events) ===
    let isDragging = false, prevX = 0, prevY = 0, dragPointerId = null;
    let userAngleX = 0, userAngleY = 0;
    const canvas3d = renderer.domElement;
    canvas3d.addEventListener('pointerdown', e => {
        // Ignorar si el target esta dentro de un boton/textarea
        if (e.target !== canvas3d) return;
        isDragging = true;
        dragPointerId = e.pointerId;
        prevX = e.clientX; prevY = e.clientY;
        canvas3d.setPointerCapture(e.pointerId);
    });
    canvas3d.addEventListener('pointermove', e => {
        if (!isDragging || e.pointerId !== dragPointerId) return;
        userAngleX += (e.clientX - prevX) * 0.005;
        userAngleY += (e.clientY - prevY) * 0.003;
        userAngleY = Math.max(-0.5, Math.min(0.8, userAngleY));
        prevX = e.clientX;
        prevY = e.clientY;
    });
    const endDrag = e => {
        if (e.pointerId !== dragPointerId) return;
        isDragging = false;
        dragPointerId = null;
    };
    canvas3d.addEventListener('pointerup', endDrag);
    canvas3d.addEventListener('pointercancel', endDrag);

    // === ANIMACION ===
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        const dt = clock.getDelta();

        // Camara fija de frente a la tela
        // En pantallas verticales (mobile retrato) acercamos para compensar el aspect estrecho
        const aspectNow = window.innerWidth / window.innerHeight;
        const radius = aspectNow >= 1 ? 16 : (16 - Math.min(5, (1 - aspectNow) * 10));
        const camY = 3 + userAngleY * 10;
        camera.position.set(userAngleX * 5, camY, radius);
        camera.lookAt(0, 0, 0);

        // Concha Frita camina en el lugar
        if (conchaModel) {
            conchaModel.position.x = 0;
            conchaModel.position.z = 0;
            conchaModel.position.y = conchaFloorY;
            conchaModel.rotation.y = 0; // mirando a cámara
            if (conchaMixer) conchaMixer.update(dt);
        }

        // Física de esfera y cubo
        bounceBodies(dt);

        // Importancias cayendo del cielo
        updateImportancias(dt);

        // Simular tela
        simulateCloth(Date.now());
        const verts = clothGeo.attributes.position.array;
        for (let i = 0; i < cloth.particles.length; i++) {
            verts[i * 3]     = cloth.particles[i].position.x;
            verts[i * 3 + 1] = cloth.particles[i].position.y;
            verts[i * 3 + 2] = cloth.particles[i].position.z;
        }
        clothGeo.attributes.position.needsUpdate = true;
        clothGeo.computeVertexNormals();


        renderer.render(scene, camera);
    }
    animate();

    // === SECUENCIA DE PLACAS DE TEXTO ===
    const show = id => document.getElementById(id).classList.add('visible');
    const hide = id => document.getElementById(id).classList.remove('visible');

    function beginExperience() {
        const loader = document.getElementById('loader');
        if (loader) loader.classList.add('done');
        // Ensure AudioContext is running for plops
        const c = ensureAudio();
        if (c && c.state !== 'running') c.resume();
        // Play music (ya precargada)
        if (soundOn) {
            const p = bgMusic.play();
            if (p && p.catch) p.catch(() => {});
        }
        // Forzar resize: en iOS Safari la URL bar cambia de tamanio al interactuar
        // y el canvas puede haber quedado chico. Re-ajustamos al viewport real.
        resizeToViewport();
        runPlacas();
    }

    function runPlacas() {
        let t = 0;
        // "Hoy no hagas nada"
        setTimeout(() => show('p1'), t += 1000);
        // +1s "Nada productivo."
        setTimeout(() => show('p2'), t += 1000);
        // 3s juntas, se van
        setTimeout(() => { hide('p1'); hide('p2'); }, t += 3000);
        // "La gente que te amarga,"
        setTimeout(() => show('p3'), t += 800);
        // +1s "Mandalos a la mierda"
        setTimeout(() => show('p4'), t += 1000);
        // 3s juntas, se van
        setTimeout(() => { hide('p3'); hide('p4'); }, t += 3000);
        // "Nada importa."
        setTimeout(() => show('p5'), t += 800);
        // 3s, se va
        setTimeout(() => hide('p5'), t += 3000);
        // "¿Qué te importa?"
        setTimeout(() => show('p6'), t += 800);
        // 3s, se va
        setTimeout(() => hide('p6'), t += 3000);
        // "¿Qué es lo que a vos te importa?" + botón Responder
        setTimeout(() => { show('p7'); document.getElementById('responder-wrap').classList.add('visible'); }, t += 800);
    }

    // Arrancar la experiencia cuando el usuario clickea "entrar"
    btnEntrar.addEventListener('click', beginExperience);

    // === OVERLAY RESPUESTA ===
    document.getElementById('btn-responder').addEventListener('click', () => {
        document.getElementById('respuesta-overlay').classList.add('active');
        document.getElementById('respuesta-overlay').querySelector('textarea').focus();
    });
    document.getElementById('btn-cerrar').addEventListener('click', () => {
        document.getElementById('respuesta-overlay').classList.remove('active');
    });
    document.getElementById('btn-enviar').addEventListener('click', () => {
        const textarea = document.getElementById('respuesta-overlay').querySelector('textarea');
        const txt = textarea.value.trim();
        if (!txt) return;
        document.getElementById('respuesta-overlay').classList.remove('active');
        textarea.value = '';
        hide('p7');
        document.getElementById('responder-wrap').classList.remove('visible');

        // Cutoff: no queremos que el fetch devuelva la entrada que acabamos de insertar
        const cutoffIso = new Date().toISOString();

        // La respuesta del usuario cae primero, destacada
        dropImportancia(txt, { highlight: true });
        persistImportancia(txt);

        // Y después llueven las de los demás (solo las anteriores al cutoff)
        setTimeout(() => rainPastImportancias(cutoffIso), 1200);
    });

    function resizeToViewport() {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    }
    window.addEventListener('resize', resizeToViewport);
    window.addEventListener('orientationchange', () => setTimeout(resizeToViewport, 300));
</script>
